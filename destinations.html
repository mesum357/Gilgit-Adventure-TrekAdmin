<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destinations — Admin Panel</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-topbar">
    <h1>Gilgit Adventure Treks — Admin</h1>
    <div class="topbar-right">
      <span class="admin-user" id="adminUser"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <nav class="admin-nav">
    <a href="index.html">Dashboard</a>
    <a href="destinations.html">Destinations</a>
    <a href="bookings.html">Bookings</a>
    <a href="reviews.html">Reviews</a>
    <a href="deals.html">Deals</a>
    <a href="subscribers.html">Subscribers</a>
    <a href="messages.html">Messages</a>
    <a href="videos.html">Videos</a>
    <a href="gallery.html">Gallery</a>
    <a href="team.html">Team</a>
    <a href="users.html">Users</a>
    <a href="login-logs.html">Login Logs</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="admin-content">
    <div class="admin-card">
      <div class="admin-card-header">
        <h2>Destinations</h2>
        <button class="btn btn-primary" onclick="showAddModal()">+ Add Destination</button>
      </div>
      <div class="admin-card-body admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>ID</th>
              <th>Name</th>
              <th>Package Type</th>
              <th>Category</th>
              <th>Price</th>
              <th>Rating</th>
              <th>Featured</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="destBody">
            <tr><td colspan="9" style="text-align:center;color:#94a3b8;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="admin-modal-overlay" id="destModal">
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h3 id="modalTitle">Add Destination</h3>
        <button class="admin-modal-close" onclick="closeModal('destModal')">&times;</button>
      </div>
      <div class="admin-modal-body">
        <form id="destForm">
          <input type="hidden" id="editId">
          <div class="form-row">
            <div class="form-group">
              <label for="dName">Name</label>
              <input type="text" id="dName" class="form-control" required>
            </div>
            <div class="form-group">
              <label for="dId">ID (numeric)</label>
              <input type="number" id="dId" class="form-control" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="dCountry">Region</label>
              <input type="text" id="dCountry" class="form-control" required>
            </div>
            <div class="form-group">
              <label for="dCategory">Category</label>
              <select id="dCategory" class="form-control" required>
                <option value="tour">Tour Package</option>
                <option value="valley">Valley</option>
                <option value="trek">Trek</option>
                <option value="lake">Lake</option>
                <option value="peak">Peak</option>
                <option value="heritage">Heritage</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="dPrice">Price (PKR)</label>
              <input type="number" id="dPrice" class="form-control" required>
            </div>
            <div class="form-group">
              <label for="dRating">Rating</label>
              <input type="number" id="dRating" class="form-control" step="0.1" min="0" max="5" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="dReviews">Review Count</label>
              <input type="number" id="dReviews" class="form-control" value="0">
            </div>
            <div class="form-group">
              <label for="dFeatured">Featured</label>
              <select id="dFeatured" class="form-control">
                <option value="false">No</option>
                <option value="true">Yes</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="dImage">Image URL</label>
            <input type="url" id="dImage" class="form-control" required>
            <input type="file" id="dImageFile" accept="image/*" style="margin-top:4px;font-size:0.8rem;">
          </div>
          <div class="form-group">
            <label for="dDesc">Description</label>
            <textarea id="dDesc" class="form-control" rows="3" required></textarea>
          </div>
          <div class="form-group">
            <label for="dHighlights">Highlights (comma separated)</label>
            <input type="text" id="dHighlights" class="form-control" placeholder="e.g. Camping, Photography, Trekking">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="dMapX">Map X</label>
              <input type="number" id="dMapX" class="form-control">
            </div>
            <div class="form-group">
              <label for="dMapY">Map Y</label>
              <input type="number" id="dMapY" class="form-control">
            </div>
          </div>

          <!-- Tour-specific fields -->
          <hr style="margin:1rem 0;border:none;border-top:1px solid #e2e8f0;">
          <h4 style="margin:0 0 0.75rem;color:#475569;font-size:0.9rem;">Tour Details (optional)</h4>
          <div class="form-row">
            <div class="form-group">
              <label for="dDuration">Duration</label>
              <input type="text" id="dDuration" class="form-control" placeholder="e.g. 10 Days / 9 Nights">
            </div>
            <div class="form-group">
              <label for="dGroupSize">Group Size</label>
              <input type="text" id="dGroupSize" class="form-control" placeholder="e.g. 6–15 people">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="dDifficulty">Difficulty</label>
              <select id="dDifficulty" class="form-control">
                <option value="">None</option>
                <option value="Easy">Easy</option>
                <option value="Moderate">Moderate</option>
                <option value="Challenging">Challenging</option>
                <option value="Extreme">Extreme</option>
              </select>
            </div>
            <div class="form-group">
              <label for="dBestSeason">Best Season</label>
              <input type="text" id="dBestSeason" class="form-control" placeholder="e.g. Spring–Autumn">
            </div>
          </div>
          <div class="form-group">
            <label for="dRoute">Route (comma separated)</label>
            <input type="text" id="dRoute" class="form-control" placeholder="e.g. Islamabad, Hunza, Skardu">
          </div>
          <div class="form-group">
            <label for="dGallery">Gallery Image URLs (one per line)</label>
            <textarea id="dGallery" class="form-control" rows="3" placeholder="Paste image URLs, one per line"></textarea>
          </div>
          <div class="form-group">
            <label for="dIncludes">Includes (one per line)</label>
            <textarea id="dIncludes" class="form-control" rows="3" placeholder="e.g. All transport&#10;Accommodation&#10;All meals"></textarea>
          </div>
          <div class="form-group">
            <label for="dExcludes">Excludes (one per line)</label>
            <textarea id="dExcludes" class="form-control" rows="3" placeholder="e.g. International flights&#10;Personal expenses"></textarea>
          </div>

          <!-- Dynamic Itinerary -->
          <div class="form-group">
            <label>Itinerary <button type="button" class="btn btn-sm btn-outline" onclick="addItineraryRow()" style="margin-left:8px;font-size:0.75rem;">+ Add Day</button></label>
            <div id="itineraryRows"></div>
          </div>
        </form>
      </div>
      <div class="admin-modal-footer">
        <button class="btn btn-outline" onclick="closeModal('destModal')">Cancel</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveDest()">Save</button>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script src="js/destinations.js"></script>
</body>
</html>
